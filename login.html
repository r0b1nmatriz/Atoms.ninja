<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Atoms Ninja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .google-btn {
            background: white;
            border: 2px solid #ddd;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            text-decoration: none;
            color: #333;
        }

        .google-btn:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .features {
            margin-top: 40px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            color: #666;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🥷</div>
        <h1>Atoms Ninja</h1>
        <p class="subtitle">AI-Powered Cybersecurity Platform</p>

        <a href="/auth/google" class="google-btn" id="loginBtn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </a>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Redirecting to Google...</p>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div>
                    <strong>Secure Authentication</strong><br>
                    <small>Google OAuth 2.0 protection</small>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div>
                    <strong>AI-Powered Tools</strong><br>
                    <small>Atom AI with 500+ security tools</small>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">🛡️</div>
                <div>
                    <strong>Professional Platform</strong><br>
                    <small>Enterprise-grade security testing</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://136.113.58.241:3002';

        // Check if already authenticated
        fetch(`${BACKEND_URL}/auth/status`, {
            credentials: 'include'
        })
        .then(r => r.json())
        .then(data => {
            if (data.authenticated) {
                // Already logged in, redirect to main app
                window.location.href = '/';
            }
        })
        .catch(err => console.log('Not authenticated'));

        // Handle login button
        document.getElementById('loginBtn').addEventListener('click', (e) => {
            document.getElementById('loading').classList.add('active');
        });

        // Check for auth callback
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('auth') === 'success') {
            window.location.href = '/';
        } else if (urlParams.get('auth') === 'error') {
            alert('Authentication failed. Please try again.');
        }
    </script>
</body>
</html>
